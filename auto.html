<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZhehanZ Edge Validation</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            background-color: #fff;
            color: #333;
        }

        .page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .hidden {
            display: none !important;
        }

        .warning-sign,
        .error-sign {
            border: 4px solid #333;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            position: relative;
            margin-bottom: 20px;
        }

        .warning-sign::before {
            content: "?";
            color: #333;
            font-size: 24px;
            font-weight: bold;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .error-sign::before {
            content: "!";
            color: #333;
            font-size: 35px;
            font-weight: bold;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .spinner {
            border: 4px solid #ddd;
            border-top: 4px solid #333;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .large {
            font-size: 1.8em;
            font-weight: bold;
            margin: 0;
        }

        .status,
        .timer {
            font-size: 1em;
            color: #777;
            margin: 8px 0 20px;
        }

        .captcha-container {
            margin: 20px 0;
        }

        .captcha-container form {
            display: inline-block;
            text-align: left;
        }

        .protection {
            font-size: 0.8em;
            color: #777;
            margin-top: 20px;
            margin-bottom: 5px;
        }

        .more-info {
            margin-top: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .more-info a {
            font-size: 0.8em;
            color: #777;
            text-decoration: underline;
            cursor: pointer;
            margin-bottom: 5px;
        }

        .info-text {
            font-size: 0.8em;
            color: #777;
            text-align: center;
            display: inline-block;
            max-width: 55%;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease;
        }

        .info-text.open {
            max-height: 200px;
            opacity: 1;
        }

        .info-text p {
            margin: 4px 0;
        }

        .cloudflare-box {
            display: none !important;
        }

        @media (prefers-color-scheme: dark) {
            body { background: #121212; color: #e0e0e0; }
            .warning-sign,
            .error-sign { border-color: #e0e0e0; }
            .warning-sign::before,
            .error-sign::before { color: #e0e0e0; }
            .spinner { border: 4px solid #444; border-top: 4px solid #e0e0e0; }
            .status, .timer, .protection, .info-text { color: #aaa; }
            .more-info a { color: #aaa; }
        }
    </style>
</head>
<body>
    <section id="captcha-view" class="page hidden">
        <div class="warning-sign"></div>
        <p class="large" id="captcha-main-text"></p>
        <p class="status" id="captcha-status-text"></p>
        <div class="captcha-container">
            <form id="captcha-form">::CAPTCHA_BOX::</form>
        </div>
        <p class="protection" id="captcha-protection-text"></p>
        <div class="more-info">
            <a id="captcha-toggle-info"></a>
            <div class="info-text" id="captcha-info-text"></div>
        </div>
    </section>

    <section id="attack-view" class="page hidden">
        <div class="spinner"></div>
        <p class="large" id="attack-main-text"></p>
        <p class="status" id="attack-status-text"></p>
        <p class="timer" id="attack-timer-text"></p>
        <div class="cloudflare-box" id="attack-box-shell">::IM_UNDER_ATTACK_BOX::</div>
        <p class="protection" id="attack-protection-text"></p>
        <div class="more-info">
            <a id="attack-toggle-info"></a>
            <div class="info-text" id="attack-info-text"></div>
        </div>
    </section>

<script>
    const lang = navigator.language.startsWith('zh') ? 'zh' : 'en';
    const texts = {
        en: {
            captcha: {
                main: 'Validation Required',
                status: 'Pass the turnstile to continue access',
                protection: 'ZhehanZ Edge Protection',
                show: 'Show details',
                hide: 'Hide details',
                details: [
                    '::RAY_ID::',
                    '::CLIENT_IP:: ::GEO:: A-INT',
                    'You need to undergo validation due to unusual traffic from your network or a strengthened security posture.'
                ]
            },
            attack: {
                main: 'A moment please',
                status1: 'Checking your network...',
                status2: 'Check complete. Proceeding...',
                protection: 'ZhehanZ Edge Protection',
                show: 'Show details',
                hide: 'Hide details',
                details: [
                    '::RAY_ID::',
                    '::CLIENT_IP:: ::GEO:: A-NON',
                    'You need to undergo validation due to unusual traffic from your network or a strengthened security posture.'
                ],
                timer: 'Refreshing in {seconds} seconds'
            }
        },
        zh: {
            captcha: {
                main: '需要完成验证',
                status: '通过以下验证以继续访问',
                protection: 'ZhehanZ Edge 守护服务',
                show: '查看更多信息',
                hide: '隐藏更多信息',
                details: [
                    '::RAY_ID::',
                    '::CLIENT_IP:: ::GEO:: 403 A-INT',
                    '您需要完成此验证过程，可能是因为您的网络流量异常，或者目标服务的安全级别较高。'
                ]
            },
            attack: {
                main: '请稍作等候',
                status1: '正在检查网络',
                status2: '检查完成，即将继续访问',
                protection: 'ZhehanZ Edge 守护服务',
                show: '查看更多信息',
                hide: '隐藏更多信息',
                details: [
                    '::RAY_ID::',
                    '::CLIENT_IP:: ::GEO:: 403 A-NON',
                    '您需要完成此验证过程，可能是因为您的网络流量异常，或者目标服务的安全级别较高。'
                ],
                timer: '{seconds} 秒后刷新'
            }
        }
    };

    const refreshSeconds = 12;
    const captchaView = document.getElementById('captcha-view');
    const attackView = document.getElementById('attack-view');
    const captchaShell = document.getElementById('captcha-form');
    const attackShell = document.getElementById('attack-box-shell');
    const state = {
        mode: null,
        countdownId: null,
        refreshId: null
    };

    function applyDetails(toggle, info, details, showLabel, hideLabel) {
        toggle.textContent = showLabel;
        toggle.addEventListener('click', () => {
            const isOpen = info.classList.toggle('open');
            toggle.textContent = isOpen ? hideLabel : showLabel;
            if (isOpen) {
                info.innerHTML = details.map(line => `<p>${line}</p>`).join('');
            }
        });
    }

    function fillTemplate(template, seconds) {
        return template.replace('{seconds}', String(seconds));
    }

    function isActivated(shell, placeholder) {
        if (!shell) {
            return false;
        }
        return !shell.innerHTML.includes(placeholder);
    }

    function stopAttackCountdown() {
        if (state.countdownId !== null) {
            window.clearInterval(state.countdownId);
            state.countdownId = null;
        }
        if (state.refreshId !== null) {
            window.clearTimeout(state.refreshId);
            state.refreshId = null;
        }
    }

    function startAttackCountdown() {
        stopAttackCountdown();

        const t = texts[lang].attack;
        const timerEl = document.getElementById('attack-timer-text');
        let remaining = refreshSeconds;

        timerEl.textContent = fillTemplate(t.timer, remaining);
        state.countdownId = window.setInterval(() => {
            remaining -= 1;
            if (remaining <= 0) {
                timerEl.textContent = fillTemplate(t.timer, 0);
                stopAttackCountdown();
                window.location.reload();
                return;
            }
            timerEl.textContent = fillTemplate(t.timer, remaining);
        }, 1000);

        state.refreshId = window.setTimeout(() => {
            window.location.reload();
        }, refreshSeconds * 1000);
    }

    function setMode(mode) {
        if (state.mode === mode) {
            return;
        }

        state.mode = mode;
        captchaView.classList.toggle('hidden', mode !== 'captcha');
        attackView.classList.toggle('hidden', mode !== 'attack');

        if (mode === 'attack') {
            startAttackCountdown();
        } else {
            stopAttackCountdown();
        }
    }

    function updateMode() {
        const captchaActive = isActivated(captchaShell, '::CAPTCHA_BOX::');
        const attackActive = isActivated(attackShell, '::IM_UNDER_ATTACK_BOX::');

        if (captchaActive) {
            setMode('captcha');
            return;
        }

        if (attackActive || state.mode !== 'captcha') {
            setMode('attack');
        }
    }

    function initializeCaptcha() {
        const t = texts[lang].captcha;
        document.getElementById('captcha-main-text').textContent = t.main;
        document.getElementById('captcha-status-text').textContent = t.status;
        document.getElementById('captcha-protection-text').textContent = t.protection;
        applyDetails(
            document.getElementById('captcha-toggle-info'),
            document.getElementById('captcha-info-text'),
            t.details,
            t.show,
            t.hide
        );
    }

    function initializeAttack() {
        const t = texts[lang].attack;
        document.getElementById('attack-main-text').textContent = t.main;
        const statusEl = document.getElementById('attack-status-text');
        statusEl.textContent = t.status1;
        document.getElementById('attack-protection-text').textContent = t.protection;
        applyDetails(
            document.getElementById('attack-toggle-info'),
            document.getElementById('attack-info-text'),
            t.details,
            t.show,
            t.hide
        );

        window.setTimeout(() => {
            if (state.mode === 'attack') {
                statusEl.textContent = t.status2;
            }
        }, 5000);
    }

    function watchForPlaceholderChanges() {
        const observer = new MutationObserver(updateMode);
        observer.observe(captchaShell, { childList: true, subtree: true, characterData: true });
        observer.observe(attackShell, { childList: true, subtree: true, characterData: true });
    }

    initializeCaptcha();
    initializeAttack();
    updateMode();
    watchForPlaceholderChanges();
</script>
</body>
</html>
